<!DOCTYPE html>
<html>
<head>
    <title>Heat Transfer Model</title>
    <script src="https://www.wolfram.com/cdf-player/plugin/latest/cdfplugin.js"></script>
    <style>
        body { font-family: Arial; max-width: 1000px; margin: 0 auto; padding: 20px; }
        h1 { color: #2c3e50; }
        .container { border: 1px solid #ddd; padding: 20px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>2D Heat Transfer Model</h1>
    <p>Interactive simulation with smoothed step function boundary condition.</p>
    
    <div class="container" style="width: 950px; height: 700px;">
        <script>
            var cdf = new cdfplugin();
            cdf.Load('heat-transfer-model.cdf', 950, 700);
        </script>
    </div>
    
    <p>Parameters: fmin (initial), fmax (final), ts (transition), m (smoothness), 
    k (conductivity), Tamb (ambient), h (convection)</p>
</body>
</html>
